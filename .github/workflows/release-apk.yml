name: Release APK Build

# Triggers when a tag matching v*.*.* is pushed. Builds a signed release APK
# (with R8 + resource shrinking enabled) and uploads it to the matching
# GitHub Release. This is what finally removes DebugProbesKt.bin and the rest
# of the debug-only overhead from the shipped APK.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Upload Release APK
    runs-on: ubuntu-latest

    env:
      # Disable Gradle daemon & enable configuration cache for CI.
      GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        # The project targets compileSdk 36 (with minor API level 1, the
        # Android 16 QPR2 preview). The ubuntu-latest runner ships Android
        # SDK 35 by default, so we install platform 36 + build-tools 36.0.0
        # explicitly. Licenses are accepted non-interactively via `yes |`.
        run: |
          set -e
          export ANDROID_HOME="${ANDROID_HOME:-/usr/local/lib/android/sdk}"
          export ANDROID_SDK_ROOT="$ANDROID_HOME"
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$ANDROID_HOME/cmdline-tools/16.0/bin/sdkmanager"
          fi
          echo "Using sdkmanager: $SDKMANAGER"
          yes | "$SDKMANAGER" --licenses > /dev/null 2>&1 || true
          "$SDKMANAGER" --install \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "platform-tools" > /dev/null
          echo "Android SDK setup complete:"
          "$SDKMANAGER" --list_installed | grep -E "(android-36|build-tools;36)" || true

      - name: Set up Gradle
        # AGP 9.1.1 requires Gradle 9.3.1+ (enforced by
        # com.android.internal.version-check plugin).
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'

      - name: Decode debug keystore
        run: |
          base64 -d debug.keystore.base64 > debug.keystore
          test -s debug.keystore && echo "Keystore decoded OK ($(wc -c < debug.keystore) bytes)"

      - name: Assemble release APK
        # assembleRelease now succeeds because build.gradle.kts falls back to
        # debug.keystore when no real upload keystore is provided.
        run: gradle assembleRelease --no-daemon --stacktrace

      - name: Inspect release APK (assert no DebugProbesKt.bin)
        # Smoke test: fail the build if R8 + packaging.excludes did not strip
        # the coroutines debug artifact. This was the original v1.1.x bug.
        run: |
          set -e
          APK_PATH=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          echo "APK: $APK_PATH"
          echo "Size: $(du -h "$APK_PATH" | cut -f1)"
          unzip -l "$APK_PATH" | tee /tmp/apk-contents.txt
          if grep -q "DebugProbesKt.bin" /tmp/apk-contents.txt; then
            echo "::error::DebugProbesKt.bin is present in the release APK — debugging overhead not stripped"
            exit 1
          fi
          echo "OK: DebugProbesKt.bin not present in release APK"

      - name: Rename APK
        id: rename
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          # Extract version from the pushed tag (e.g. v1.2.0 -> 1.2)
          VERSION="${GITHUB_REF_NAME#v}"
          # Strip patch segment so "1.2.0" -> "1.2" to match the existing
          # naming convention lucientness-1.1.apk used in v1.1.x.
          VERSION_NO_PATCH=$(echo "$VERSION" | cut -d. -f1,2)
          OUT_NAME="lucientness-${VERSION_NO_PATCH}.apk"
          cp "$APK_PATH" "$OUT_NAME"
          echo "apk_path=$OUT_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          ls -lh "$OUT_NAME"

      - name: Upload APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.rename.outputs.apk_path }}
          name: Release ${{ steps.rename.outputs.version }}
          body: |
            ## What changed in ${{ steps.rename.outputs.version }}

            ### AI responses now render as Markdown
            Previously the AI assistant's responses showed raw Markdown syntax (`**bold**`, `***italic***`, backticks, etc.) instead of styled text. This release adds a custom Markdown renderer (`MarkdownText.kt`) that parses and styles:

            - **bold**, *italic*, ~~strikethrough~~
            - `inline code` with a tinted background
            - Fenced code blocks (```...```) rendered as their own dark card with monospace font
            - Headings (`#`, `##`, `###`)
            - Links `[label](url)` styled in accent color
            - Unordered lists (`-`, `*`, `+`) and ordered lists (`1.`, `2.`, ...)
            - Blockquotes (`>`) with an accent-colored vertical bar
            - Horizontal rules (`---`)

            The renderer is a native Compose implementation (no extra dependency), so it inherits the app's dark-fantasy theme colors and stays compatible with R8 minification.

            ### AI responses can now be selected & copied
            Long-press on the AI response now brings up the text selection handles so you can copy any portion of the answer (the raw Markdown source is what gets copied). Previously the response text was non-selectable.

            ### AI configuration dialog opens with empty fields
            The Endpoint URL and Model Name fields no longer ship with the pre-filled `https://api.openai.com/v1/chat/completions` and `gpt-4` defaults — they now open blank so you can type your own values without first deleting the placeholders. The `isConfigured()` validation still requires all three fields to be non-blank before the assistant can be opened.

            ### Bug fix — keyboard does not appear when tapping an empty file
            On a freshly-created empty file, tapping the empty editor area did not bring up the soft keyboard — you had to tap and drag left first. Root cause: the `horizontalScroll` modifier on the wrapper `Box` intercepted taps before they reached the `BasicTextField`, so the field never got focus. Fix: moved `horizontalScroll` onto the `BasicTextField` itself, added a `FocusRequester` + `LocalSoftwareKeyboardController` to the editor, wrapped the editor row in a `clickable` that requests focus and shows the keyboard on any tap, and auto-focuses the field once on file open.

            ### Bug fix — AI prompt input no longer hidden by the keyboard
            When the AI response was long, the prompt input row could end up hidden behind the soft keyboard. The bottom sheet content now uses `Modifier.imePadding()` plus `navigationBarsPadding()` so the input row stays above the keyboard at all times.

            ### Version bump
            `versionCode` 2 → 3, `versionName` "1.2" → "1.3".

            ### CI
            Builds are produced automatically by GitHub Actions on every `v*.*.*` tag push. The workflow asserts that `DebugProbesKt.bin` is not present in the final APK before publishing.
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
