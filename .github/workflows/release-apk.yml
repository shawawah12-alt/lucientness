name: Release APK Build

# Triggers when a tag matching v*.*.* is pushed. Builds a signed release APK
# (with R8 + resource shrinking enabled) and uploads it to the matching
# GitHub Release. This is what finally removes DebugProbesKt.bin and the rest
# of the debug-only overhead from the shipped APK.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Upload Release APK
    runs-on: ubuntu-latest

    env:
      # Disable Gradle daemon & enable configuration cache for CI.
      GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        # The project targets compileSdk 36 (with minor API level 1, the
        # Android 16 QPR2 preview). The ubuntu-latest runner ships Android
        # SDK 35 by default, so we install platform 36 + build-tools 36.0.0
        # explicitly. Licenses are accepted non-interactively via `yes |`.
        run: |
          set -e
          export ANDROID_HOME="${ANDROID_HOME:-/usr/local/lib/android/sdk}"
          export ANDROID_SDK_ROOT="$ANDROID_HOME"
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$ANDROID_HOME/cmdline-tools/16.0/bin/sdkmanager"
          fi
          echo "Using sdkmanager: $SDKMANAGER"
          yes | "$SDKMANAGER" --licenses > /dev/null 2>&1 || true
          "$SDKMANAGER" --install \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "platform-tools" > /dev/null
          echo "Android SDK setup complete:"
          "$SDKMANAGER" --list_installed | grep -E "(android-36|build-tools;36)" || true

      - name: Set up Gradle
        # AGP 9.1.1 requires Gradle 9.3.1+ (enforced by
        # com.android.internal.version-check plugin).
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'

      - name: Decode debug keystore
        run: |
          base64 -d debug.keystore.base64 > debug.keystore
          test -s debug.keystore && echo "Keystore decoded OK ($(wc -c < debug.keystore) bytes)"

      - name: Assemble release APK
        # assembleRelease now succeeds because build.gradle.kts falls back to
        # debug.keystore when no real upload keystore is provided.
        run: gradle assembleRelease --no-daemon --stacktrace

      - name: Inspect release APK (assert no DebugProbesKt.bin)
        # Smoke test: fail the build if R8 + packaging.excludes did not strip
        # the coroutines debug artifact. This was the original v1.1.x bug.
        run: |
          set -e
          APK_PATH=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          echo "APK: $APK_PATH"
          echo "Size: $(du -h "$APK_PATH" | cut -f1)"
          unzip -l "$APK_PATH" | tee /tmp/apk-contents.txt
          if grep -q "DebugProbesKt.bin" /tmp/apk-contents.txt; then
            echo "::error::DebugProbesKt.bin is present in the release APK — debugging overhead not stripped"
            exit 1
          fi
          echo "OK: DebugProbesKt.bin not present in release APK"

      - name: Rename APK
        id: rename
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          # Extract version from the pushed tag (e.g. v1.2.0 -> 1.2)
          VERSION="${GITHUB_REF_NAME#v}"
          # Strip patch segment so "1.2.0" -> "1.2" to match the existing
          # naming convention lucientness-1.1.apk used in v1.1.x.
          VERSION_NO_PATCH=$(echo "$VERSION" | cut -d. -f1,2)
          OUT_NAME="lucientness-${VERSION_NO_PATCH}.apk"
          cp "$APK_PATH" "$OUT_NAME"
          echo "apk_path=$OUT_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          ls -lh "$OUT_NAME"

      - name: Upload APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.rename.outputs.apk_path }}
          name: Release ${{ steps.rename.outputs.version }}
          body: |
            ## What changed in ${{ steps.rename.outputs.version }}

            ### Bug fix — sidebar gesture
            Swiping horizontally on the HTML preview no longer opens the left sidebar. The previous `pointerInput { detectTransformGestures { ... } }` wrapper on the WebView only consumed multi-touch transforms (pinch/rotate), leaving single-pointer horizontal drags to leak up to `ModalNavigationDrawer`'s edge-swipe detector. The empty lambda also stole touch events from the WebView, which is why the HTML preview only moved a tiny bit when swiped.

            Fix:
            - Removed the broken `pointerInput` interceptor from `CodePreviewer.kt`.
            - Set `gesturesEnabled = !isPreviewMode` on `ModalNavigationDrawer` in `MainScreen.kt`, so the drawer's edge-swipe detector is disabled while the preview is on screen. The hamburger button still opens the drawer normally.
            - Enabled `loadWithOverviewMode`, `useWideViewPort`, and scrollbars on the WebView so the rendered HTML can be panned properly inside the preview pane.

            ### Debugging overhead eliminated
            v1.1.x shipped a **debug APK (22 MB)** containing `DebugProbesKt.bin` (kotlinx-coroutines-debug), Compose UI tooling, and the test manifest. This release is built via `assembleRelease` with:

            - `isMinifyEnabled = true` (R8 code shrinking)
            - `isShrinkResources = true` (resource shrinking)
            - `isDebuggable = false` (explicit)
            - `packaging.resources.excludes` that hard-strips `DebugProbesKt.bin` and other debug-only metadata out of the APK even if R8 misses them.
            - Full ProGuard keep rules for Moshi, Retrofit, OkHttp, Room, Compose, WebView JS interface, Firebase, Coroutines, and the app's own model/network classes so reflection-based code paths survive R8 minification.

            ### Release build now actually succeeds
            Previously `signingConfigs.release` pointed at `my-upload-key.jks` which was never committed, so any attempt at `assembleRelease` failed and the developer had to ship the debug APK instead. The build now falls back to the checked-in `debug.keystore` when no real upload keystore is configured via env vars, keeping the v1.1.x signing identity stable.

            ### Version bump
            `versionCode` 1 → 2, `versionName` "1.0" → "1.2".

            ### CI
            Builds are now produced automatically by GitHub Actions on every `v*.*.*` tag push. The workflow asserts that `DebugProbesKt.bin` is not present in the final APK before publishing.
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
