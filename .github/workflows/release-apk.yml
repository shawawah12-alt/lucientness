name: Release APK Build

# Triggers when a tag matching v*.*.* is pushed. Builds a signed release APK
# (with R8 + resource shrinking enabled) and uploads it to the matching
# GitHub Release. This is what finally removes DebugProbesKt.bin and the rest
# of the debug-only overhead from the shipped APK.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Upload Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platforms;android-36
            build-tools;36.0.0

      - name: Set up Gradle
        # The repo does not ship a Gradle wrapper (AI Studio uses an internal
        # Gradle install). Use the setup-gradle action which provisions a
        # known-good Gradle distribution and generates the wrapper on the fly.
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14.3'

      - name: Decode debug keystore
        # The repo ships debug.keystore.base64 (the standard Android debug
        # keystore). build.gradle.kts falls back to this file when no
        # KEYSTORE_PATH env var is provided, which keeps release builds
        # reproducible without requiring the user to manage a real upload
        # keystore as a CI secret.
        run: |
          base64 -d debug.keystore.base64 > debug.keystore
          test -s debug.keystore && echo "Keystore decoded OK"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml', '**/gradle.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Assemble release APK
        # assembleRelease now succeeds because build.gradle.kts falls back to
        # debug.keystore when no real upload keystore is provided.
        run: gradle assembleRelease --no-daemon --stacktrace

      - name: Inspect release APK (assert no DebugProbesKt.bin)
        # Smoke test: fail the build if R8 + packaging.excludes did not strip
        # the coroutines debug artifact. This was the original v1.1.x bug.
        run: |
          set -e
          APK_PATH=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          echo "APK: $APK_PATH"
          unzip -l "$APK_PATH" | tee /tmp/apk-contents.txt
          if grep -q "DebugProbesKt.bin" /tmp/apk-contents.txt; then
            echo "::error::DebugProbesKt.bin is present in the release APK — debugging overhead not stripped"
            exit 1
          fi
          echo "OK: DebugProbesKt.bin not present in release APK"

      - name: Rename APK
        id: rename
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          # Extract version from the pushed tag (e.g. v1.2.0 -> 1.2)
          VERSION="${GITHUB_REF_NAME#v}"
          # Strip patch segment so "1.2.0" -> "1.2" to match the existing
          # naming convention lucientness-1.1.apk used in v1.1.x.
          VERSION_NO_PATCH=$(echo "$VERSION" | cut -d. -f1,2)
          OUT_NAME="lucientness-${VERSION_NO_PATCH}.apk"
          cp "$APK_PATH" "$OUT_NAME"
          echo "apk_path=$OUT_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          ls -lh "$OUT_NAME"

      - name: Upload APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.rename.outputs.apk_path }}
          name: Release ${{ steps.rename.outputs.version }}
          body: |
            ## What changed in ${{ steps.rename.outputs.version }}

            - **Bug fix (sidebar gesture):** Swiping horizontally on the HTML preview no longer opens the left sidebar. The previous `pointerInput { detectTransformGestures { ... } }` on the WebView only consumed multi-touch transforms, leaving single-pointer drags to leak up to `ModalNavigationDrawer`'s edge-swipe detector. The fix removes that broken interceptor and disables `gesturesEnabled` on the drawer while preview mode is active, so the WebView owns its own touch stream again.
            - **Debugging overhead removed:** v1.1.x shipped a debug APK (22 MB) containing `DebugProbesKt.bin` (kotlinx-coroutines-debug), Compose UI tooling, and the test manifest. This release is built via `assembleRelease` with `isMinifyEnabled = true`, `isShrinkResources = true`, and explicit `packaging.resources.excludes` that hard-strip `DebugProbesKt.bin` and other debug artifacts out of the final APK.
            - **Release build now actually succeeds:** Previously `signingConfigs.release` pointed at `my-upload-key.jks` which was never committed, so any attempt at `assembleRelease` failed and the developer had to ship the debug APK instead. The build now falls back to the checked-in `debug.keystore` when no real upload keystore is configured via env vars, keeping the v1.1.x signing identity stable.
            - **ProGuard rules:** Full keep rules for Moshi, Retrofit, OkHttp, Room, Compose, WebView, Firebase, and the app's own model classes so reflection-based code paths survive R8 minification.
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
